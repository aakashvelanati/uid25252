<!DOCTYPE html>
<html>
<head>
    <title>Electronics</title>
    <style>
        body {
            margin: 0;
            background-color: aliceblue;
            font-family: sans-serif;
        }

        
        .products {
            grid-area: products;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .product-card {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }
        .p{
            text-align: center;
            background-color: tomato;
            align-items: center;
        }
        img{
            width: 120px;
            height: auto;
            border-radius: 8px;
        }
        

        .button {
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 50px;
            margin-top: 10px;
        }

        .button:hover {
            background-color: #7094ff;
        }
    </style>
</head>
<body>
        <div class="products">
            <div class="product-card">
                <img src="C:\Users\polin\aakash\Pictures\coo.jpg">
                <h3>pressure cooker</h3>
                <p>$69</p>
                <button class="button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\polin\aakash\Pictures\af.jpg" >
                <h3>Air fryer</h3>
                <p>$99</p>
                <button class="button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\polin\aakash\Pictures\is.jpg">
                <h3>Induction stove </h3>
                <p>$119</p>
                <button class="button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\polin\aakash\Pictures\ket.jpg">
                <h3>kettle </h3>
                <p>$59</p>
                <button class="button">Add to Cart</button>
            </div>
        </div>
</body>
